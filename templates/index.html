<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Heart Disease Risk API</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <h1>Heart Disease Risk Prediction</h1>
        <form action="/predict" method="post" class="grid-form">
          <label>Age <input name="age" type="number" step="1" value="54" required></label>
          <label>Sex <input name="sex" type="number" min="0" max="1" value="1" required></label>
          <label>Chest pain type <input name="cp" type="number" min="1" max="4" value="4" required></label>
          <label>Resting BP <input name="trestbps" type="number" step="1" value="130" required></label>
          <label>Cholesterol <input name="chol" type="number" step="1" value="250" required></label>
          <label>Fasting blood sugar <input name="fbs" type="number" min="0" max="1" value="0" required></label>
          <label>Rest ECG <input name="restecg" type="number" min="0" max="2" value="1" required></label>
          <label>Max heart rate <input name="thalach" type="number" step="1" value="150" required></label>
          <label>Exercise angina <input name="exang" type="number" min="0" max="1" value="0" required></label>
          <label>Oldpeak <input name="oldpeak" type="number" step="0.1" value="1.0" required></label>
          <label>Slope <input name="slope" type="number" min="1" max="3" value="2" required></label>
          <label>CA <input name="ca" type="number" min="0" max="3" value="0" required></label>
          <label>Thal <input name="thal" type="number" value="3" required></label>
          <button type="submit">Predict</button>
        </form>
      </section>
    </main>
  </body>
</html>
